<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="eGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>

    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- E LETTERFORM -->
  <g filter="url(#glow)">
    <rect x="20" y="20" width="22" height="160" fill="url(#eGrad)" rx="2"/>
    <rect x="20" y="20" width="100" height="22" fill="url(#eGrad)" rx="2"/>
    <rect x="20" y="89" width="78" height="18" fill="url(#eGrad)" rx="2"/>
    <rect x="20" y="158" width="100" height="22" fill="url(#eGrad)" rx="2"/>
  </g>

  <!-- C LETTERFORM -->
  <g filter="url(#glow)">
    <path d="M 248 50 A 70 70 0 1 0 248 150"
          fill="none"
          stroke="url(#cGrad)"
          stroke-width="24"
          stroke-linecap="square"/>
  </g>

</svg>
